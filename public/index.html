<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalog Persediaan - SisKA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .5; }
        }
        .animate-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen pb-24">

    <div class="max-w-3xl mx-auto p-4">
        <div class="bg-white rounded-xl shadow p-4 text-center mb-4 border-b-4 border-blue-500">
            <h1 class="text-lg font-bold text-gray-800">Pengambilan Persediaan</h1>
            <p class="text-sm text-gray-500">Biro Keuangan dan BMN</p>
        </div>

        <div id="container-barang" class="space-y-2">
            <div class="text-center p-10 text-gray-500 font-semibold animate-pulse">
                Mengambil data dari Gudang...
            </div>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 p-4 bg-white/80 backdrop-blur-md shadow-lg flex justify-center">
        <button onclick="bukaModal()" class="w-full max-w-md bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg transition-all active:scale-95 flex items-center justify-center gap-2">
            Kirim ke WhatsApp
        </button>
    </div>

    <div id="modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50 p-4">
        <div class="bg-white rounded-2xl p-6 w-full max-w-md shadow-2xl">
            <h2 class="font-bold text-xl mb-4 text-gray-800">Konfirmasi Pesanan</h2>
            <ul id="list-konfirmasi" class="text-sm mb-6 max-h-60 overflow-y-auto space-y-1 text-gray-600">
                </ul>
            <div class="flex justify-end gap-3">
                <button onclick="tutupModal()" class="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg font-semibold">Kembali</button>
                <button onclick="sendToWA()" class="px-5 py-2 bg-blue-600 text-white rounded-lg font-bold shadow-md hover:bg-blue-700">Kirim Sekarang</button>
            </div>
        </div>
    </div>

    <script>
        let databaseBarang = [];
        let keranjang = {};

        // 1. Ambil data dari API lu (Pastikan endpoint /api/barang jalan)
        fetch('/api/barang')
            .then(res => res.json())
            .then(data => {
                databaseBarang = data;
                renderBarang();
            })
            .catch(err => {
                console.error("Gagal load barang:", err);
                document.getElementById('container-barang').innerHTML = `<p class="text-center text-red-500">Gagal memuat data barang.</p>`;
            });

        function renderBarang() {
            const container = document.getElementById('container-barang');
            container.innerHTML = '';
            
            databaseBarang.forEach(barang => {
                const jumlah = keranjang[barang.id] || 0;
                container.innerHTML += `
                    <div class="flex items-center justify-between bg-white p-4 rounded-xl shadow-sm hover:shadow-md transition-shadow">
                        <img src="${barang.img}" class="w-14 h-14 object-contain bg-gray-50 rounded-lg p-1" onerror="this.src='https://placehold.co/100x100?text=No+Img'">
                        <div class="flex-1 ml-4">
                            <h2 class="font-bold text-gray-800">${barang.nama}</h2>
                            <p class="text-xs text-gray-500">${barang.satuan} | Stok: <span class="font-bold text-blue-600">${barang.stok}</span></p>
                        </div>
                        <div class="flex items-center gap-3 bg-gray-100 rounded-lg p-1">
                            <button onclick="ubahJumlah('${barang.id}', -1, ${barang.stok})" class="w-8 h-8 flex items-center justify-center bg-white rounded-md text-red-500 font-bold shadow-sm">-</button>
                            <span class="w-6 text-center font-bold text-gray-700">${jumlah}</span>
                            <button onclick="ubahJumlah('${barang.id}', 1, ${barang.stok})" class="w-8 h-8 flex items-center justify-center bg-white rounded-md text-green-500 font-bold shadow-sm">+</button>
                        </div>
                    </div>
                `;
            });
        }

        function ubahJumlah(id, perubahan, stok) {
            let jumlah = (keranjang[id] || 0) + perubahan;
            if (jumlah < 0) jumlah = 0;
            if (jumlah > stok) { alert("Stok tidak mencukupi!"); jumlah = stok; }
            keranjang[id] = jumlah;
            renderBarang();
        }

        function bukaModal() {
            const list = [];
            let teks = "!ORDER_BARANG\n\n";
            let adaBarang = false;

            databaseBarang.forEach(b => {
                const qty = keranjang[b.id] || 0;
                if (qty > 0) {
                    list.push(`<li>• <b>${b.nama}</b> (${qty} ${b.satuan})</li>`);
                    teks += `- ${b.nama} (${qty} ${b.satuan})\n`;
                    adaBarang = true;
                }
            });

            if (!adaBarang) return alert("Pilih barang dulu, brad!");

            document.getElementById('list-konfirmasi').innerHTML = list.join('');
            window.teksWA = teks; // Simpan teks global
            document.getElementById('modal').style.display = 'flex';
        }

        function tutupModal() {
            document.getElementById('modal').style.display = 'none';
        }

        function sendToWA() {
            // NOMOR BOT SISKA
            const nomor = "6285122777026"; 
            window.location.href = `https://wa.me/${nomor}?text=${encodeURIComponent(window.teksWA)}`;
        }
    </script>
</body>
</html>
